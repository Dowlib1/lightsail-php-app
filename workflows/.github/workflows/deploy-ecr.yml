name: Build, Push to ECR and Deploy to Lightsail

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-west-3

jobs:
  build-and-push:
    name: Build and push Docker image to ECR
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.set-output.outputs.IMAGE_URI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1

      - name: Determine image name and tag
        id: set-output
        run: |
          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          REPO=${{ secrets.ECR_REPOSITORY }}
          TAG=${{ github.sha }}
          IMAGE_URI="$ECR_REGISTRY/$REPO:$TAG"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.set-output.outputs.IMAGE_URI }}

  deploy:
    name: Deploy image to Lightsail instance
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout (for any small helper scripts)
        uses: actions/checkout@v4

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.8.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy pull image on remote and run container
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_CONTAINER_NAME: ${{ secrets.REMOTE_CONTAINER_NAME }}
        run: |
          echo "IMAGE_URI=$IMAGE_URI"
          # Get ECR login password and pass it over SSH to docker login on remote, then pull and run
          aws ecr get-login-password --region $AWS_REGION | \
            ssh -o StrictHostKeyChecking=no ${REMOTE_USER}@${REMOTE_HOST} \
              "set -e
               REG=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
               echo 'Logging in to ECR on remote...'
               docker login --username AWS --password-stdin $REG
               echo 'Pulling image $IMAGE_URI...'
               docker pull $IMAGE_URI
               echo 'Stopping existing container (if any)...'
               docker stop ${REMOTE_CONTAINER_NAME} || true
               docker rm ${REMOTE_CONTAINER_NAME} || true
               echo 'Running new container...'
               docker run -d --restart unless-stopped --name ${REMOTE_CONTAINER_NAME} \
                 -e DB_HOST='${{ secrets.DB_HOST }}' \
                 -e DB_PORT='${{ secrets.DB_PORT }}' \
                 -e DB_NAME='${{ secrets.DB_NAME }}' \
                 -e DB_USER='${{ secrets.DB_USER }}' \
                 -e DB_PASS='${{ secrets.DB_PASS }}' \
                 -p 80:80 $IMAGE_URI
               echo 'Deploy finished.'"